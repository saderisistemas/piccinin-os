[build]
  # O diretório que o Netlify deve publicar. Tudo aqui dentro vai pro ar.
  publish = "dashboard"

[build.environment]
  # Define o ambiente como produção
  NODE_ENV = "production"

[[headers]]
  # Configuração profissional para garantir que index HTML não fique em cache (sempre a versão nova)
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

[[headers]]
  # Arquivos estáticos ganham cache agressivo pra economizar banda e acelerar abertura
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
